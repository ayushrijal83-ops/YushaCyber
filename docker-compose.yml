# =============================================================================
# YushaCyber — docker-compose (YC-025.0)
# =============================================================================
# Local, production-shaped stack: the same image the deploy will use,
# talking to a real PostgreSQL instead of SQLite. Useful for catching
# Postgres-specific issues (case-sensitive names, driver types, migrations)
# BEFORE they ship.
#
#   docker compose up --build          # foreground, sees logs
#   docker compose exec app flask db upgrade
#   docker compose down                # stops both services
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: yushacyber
      POSTGRES_PASSWORD: yushacyber
      POSTGRES_DB: yushacyber
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yushacyber"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY:-please-set-me-in-a-real-env}
      DATABASE_URL: postgresql://yushacyber:yushacyber@db:5432/yushacyber
      SESSION_COOKIE_SECURE: "false"   # set to true behind HTTPS
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"

volumes:
  pgdata:
